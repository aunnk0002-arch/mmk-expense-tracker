kind = "web"
previewPath = "/"
title = "MMK Expense Tracker"
version = "1.0.0"
id = "artifacts/mmk-expense-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25536

[services.development]
run = "pnpm --filter @workspace/mmk-expense-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mmk-expense-tracker", "run", "build" ]
publicDir = "artifacts/mmk-expense-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25536"
BASE_PATH = "/"
